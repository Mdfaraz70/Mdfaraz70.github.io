<!DOCTYPE html>
<html>
<head>
<title>Sign Up - MD Faraz</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family:Arial,sans-serif;
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:30px;
border-radius:12px;
width:320px;
box-shadow:0 0 15px rgba(0,0,0,.15);
}

input{
width:100%;
padding:12px;
margin:8px 0;
}

button{
width:100%;
padding:12px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
<h2>Create Account</h2>

<input type="text" id="name" placeholder="Full Name">

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<button onclick="signup()">Create Account</button>

<br><br>

<a href="login.html">Already have an account?</a>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { getAuth, createUserWithEmailAndPassword }

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import { getFirestore, doc, setDoc }

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyDoHgXx_Tc4unTZUNUVhubMD1tAUCbKWQI",

authDomain: "mdfarazloginpage.firebaseapp.com",

projectId: "mdfarazloginpage",

storageBucket: "mdfarazloginpage.firebasestorage.app",

messagingSenderId: "1046007704185",

appId: "1:1046007704185:web:d46acdf9177369a45b02a8"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

window.signup = async function(){

const name =
document.getElementById("name").value;

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

try{

const userCredential =
await createUserWithEmailAndPassword(
auth,
email,
password
);

await setDoc(
doc(db,"users",userCredential.user.uid),
{
name:name,
email:email,
createdAt:new Date().toISOString()
}
);

alert("Account Created Successfully");

window.location.href="login.html";

}catch(error){

alert(error.message);

}

}

</script>

</body>
</html>
