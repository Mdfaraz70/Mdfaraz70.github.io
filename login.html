<!DOCTYPE html>
<html>
<head>
<title>Login - MD Faraz</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family:Arial,sans-serif;
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:30px;
border-radius:12px;
width:320px;
box-shadow:0 0 15px rgba(0,0,0,.15);
}

input{
width:100%;
padding:12px;
margin:8px 0;
}

button{
width:100%;
padding:12px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
<h2>Login</h2>

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

<br><br>

<a href="signup.html">Create Account</a>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { getAuth, signInWithEmailAndPassword }

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {

apiKey: "PASTE_YOURS",

authDomain: "mdfarazloginpage.firebaseapp.com",

projectId: "mdfarazloginpage",

storageBucket: "mdfarazloginpage.firebasestorage.app",

messagingSenderId: "1046007704185",

appId: "1:1046007704185:web:d46acdf9177369a45b02a8"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

window.login = function(){

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

signInWithEmailAndPassword(auth,email,password)

.then(() => {

alert("Login Successful");

window.location.href="index.html";

})

.catch(error => {

alert(error.message);

});

}

</script>

</body>
</html>
